<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Storm TV</title>
<!-- receiver v5: + periodic anti-screensaver sweep -->
<style>
  html, body { margin: 0; height: 100%; background: #0a0a0f; color: #ECECF1;
    font-family: -apple-system, system-ui, "Helvetica Neue", sans-serif; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #stage iframe, #stage video, #stage img { border: 0; width: 100%; height: 100%; }
  #stage video, #stage img { object-fit: contain; background: #000; }
  #idle { text-align: center; opacity: 0.55; }
  #idle .bolt { font-size: 14vmin; line-height: 1; }
  #idle .label { font-size: 4vmin; letter-spacing: 0.15em; margin-top: 2vmin; }
  .card { max-width: 78vw; max-height: 82vh; overflow: auto; padding: 6vmin;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3vmin; font-size: 3.2vmin; line-height: 1.5; }
  .card h1, .card h2 { margin-top: 0; }
  /* Anti-screensaver: a soft light band swept across every ~18s so a static-image
     detector keeps seeing motion. Tunable via #sweep opacity + the JS interval. */
  #sweep { position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0;
    background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,0.14) 50%, transparent 62%); }
  #sweep.on { animation: stormSweep 1.8s ease-in-out; }
  @keyframes stormSweep {
    0% { opacity: 0; transform: translateX(-65%); }
    12% { opacity: 1; } 88% { opacity: 1; }
    100% { opacity: 0; transform: translateX(65%); } }
</style>
<!-- Google Cast Application Framework (CAF) receiver SDK -->
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <div id="stage"><div id="idle"><div class="bolt">⚡</div><div class="label">STORM</div></div></div>
  <div id="sweep"></div>

<script>
  // Custom message channel Storm sends on. Sender uses the same namespace.
  const NAMESPACE = 'urn:x-cast:dev.storm';
  const stage = document.getElementById('stage');

  function mount(node) { stage.replaceChildren(node); }

  let appFrame = null;    // the current interactive iframe (url/page) — target for input relay
  let lastSender = null;  // last sender id — where we forward the app's events back

  // One message-driven canvas. Storm decides what the TV shows.
  // { type: 'url'|'video'|'image'|'html'|'page'|'clear', ... }
  function render(msg) {
    appFrame = null;      // cleared on every content swap; set again for url/page below
    switch (msg && msg.type) {
      case 'ping': case 'ready': return;            // control messages — never rendered
      case 'url': {                                   // games, karaoke, YouTube embeds, live pages
        const f = document.createElement('iframe');
        f.src = msg.url;
        f.allow = 'autoplay; fullscreen; encrypted-media; gamepad; microphone; camera';
        appFrame = f; mount(f); break;
      }
      case 'video': {                                 // a direct video/HLS URL
        const v = document.createElement('video');
        v.src = msg.url; v.autoplay = true; v.playsInline = true;
        v.controls = msg.controls !== false;
        mount(v); break;
      }
      case 'image': {
        const i = document.createElement('img'); i.src = msg.url; mount(i); break;
      }
      case 'html': {                                  // a rendered card / diagram fragment (no JS)
        const d = document.createElement('div'); d.className = 'card';
        d.innerHTML = msg.html || ''; mount(d); break;
      }
      case 'page': {                                  // a FULL html doc sent over the channel — JS RUNS, nothing hosted
        const f = document.createElement('iframe');   // srcdoc → private + dynamic (vs 'url' which is public/hosted)
        f.srcdoc = msg.html || '';
        f.allow = 'autoplay; fullscreen; encrypted-media; gamepad; microphone; camera';
        appFrame = f; mount(f); break;
      }
      case 'clear':
      default: {
        const idle = document.createElement('div'); idle.id = 'idle';
        idle.innerHTML = '<div class="bolt">⚡</div><div class="label">STORM</div>';
        mount(idle);
      }
    }
  }

  const context = cast.framework.CastReceiverContext.getInstance();
  context.addCustomMessageListener(NAMESPACE, (event) => {
    try {
      lastSender = event.senderId;
      const msg = event.data;
      // Readiness handshake: the sender pings until we answer, then sends the
      // real message — so content is never dropped while this page is still loading.
      if (msg && msg.type === 'ping') {
        context.sendCustomMessage(NAMESPACE, event.senderId, { type: 'ready' });
        return;
      }
      // Interaction: relay the input into the running app (chess/map) — no re-render.
      if (msg && msg.type === 'input') {
        if (appFrame && appFrame.contentWindow) {
          appFrame.contentWindow.postMessage({ storm: 'input', action: msg.action, data: msg.data || {} }, '*');
        }
        return;
      }
      render(msg);
    } catch (e) { console.error('storm render error', e); }
  });

  // Forward events the running app emits (postMessage {storm:'event',...}) back to Storm.
  window.addEventListener('message', (e) => {
    const d = e.data;
    if (d && d.storm === 'event' && lastSender) {
      try { context.sendCustomMessage(NAMESPACE, lastSender, { type: 'event', name: d.name, data: d.data }); }
      catch (err) {}
    }
  });
  // Stay alive between messages (this is a persistent canvas, not a media session).
  context.start({ disableIdleTimeout: true });

  // Keep the TV awake. Non-media receivers otherwise drop to the device's ambient
  // / backdrop screensaver after ~30s. Best-effort: Screen Wake Lock (re-acquired
  // when we become visible again) + a silent looping media element so the device
  // registers an active session. If the device still screensavers, raise its
  // ambient/backdrop delay in Google Home / Google-TV settings (the sure fix).
  let wakeLock = null;
  async function keepAwake() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }
    catch (e) { console.warn('wakeLock unavailable', e); }
  }
  keepAwake();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') keepAwake();
  });
  // 1x1 silent looping video — a no-op "active session" hint for the device.
  try {
    const keep = document.createElement('video');
    keep.muted = true; keep.loop = true; keep.autoplay = true; keep.playsInline = true;
    keep.style.cssText = 'position:fixed;width:2px;height:2px;opacity:0.01;pointer-events:none;left:0;bottom:0;';
    // tiny silent webm (1 frame), data URI — no network
    keep.src = 'data:video/webm;base64,GkXfo59ChoEBQveBAULygQRC84EIQoKEd2VibUKHgQRChYECGFOAZwEAAAAAAAHTEU2bdLpNu4tTq4QVSalmU6yBoU27i1OrhBZUrmtTrIHGTbuMU6uEElTDZ1OsggEXTbuMU6uEHFO7a1OsghV17AEAAAAAAAAZQAAAAAAAAA';
    document.body.appendChild(keep);
    keep.play().catch(() => {});
  } catch (e) {}

  // Periodic light sweep so a static-image screensaver detector keeps seeing motion.
  const sweepEl = document.getElementById('sweep');
  function doSweep(){ sweepEl.classList.remove('on'); void sweepEl.offsetWidth; sweepEl.classList.add('on'); }
  setInterval(doSweep, 18000);
</script>
</body>
</html>
